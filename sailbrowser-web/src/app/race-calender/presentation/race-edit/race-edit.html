<app-toolbar title="Edit race details" showBack />
<form (ngSubmit)="submit()" [formGroup]="form" novalidate>
  <div class="type-display">Race type: <strong>{{ derivedRaceTypeLabel() }}</strong></div>

  @if (!isPrimaryLevelRatingSeries()) {
    <mat-checkbox formControlName="isPursuit">Pursuit race</mat-checkbox>
  }

  <mat-checkbox formControlName="isDiscardable">Is discardable</mat-checkbox>
  <mat-checkbox formControlName="isAverageLap">Is the race an average lap race</mat-checkbox>

  <div>
    <app-submit-button [disabled]="form.invalid || !form.dirty" [busy]="busy()">
      Save
    </app-submit-button>
  </div>

</form>
