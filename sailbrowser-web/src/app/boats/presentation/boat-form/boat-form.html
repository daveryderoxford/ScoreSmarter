<form (ngSubmit)="submit()" [formGroup]="form" novalidate fxLayout="column" fxLayoutAlign="space-around"
  fxLayoutGap=10px>

  <app-boat-core-fields [form]="form" [boatLevelSchemes]="boatLevelSchemes()" />

  @if (mode() !== 'entryDialog') {
    <mat-checkbox formControlName="isClub">Club boat</mat-checkbox>
  }

  <div fxLayout="row" fxLayoutAlign="space-between center">
    <app-submit-button [disabled]="form.invalid || !form.dirty" [busy]="busy()">
      Save
    </app-submit-button>
  </div>

</form>
