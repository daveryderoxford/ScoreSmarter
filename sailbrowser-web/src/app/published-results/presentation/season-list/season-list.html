<div class="container">
  <div class="filter-container">
    <mat-form-field class="filter" appearance="outline">
      <mat-label>Filter Series</mat-label>
      <input matInput type="text" [ngModel]="subseriesFilter()" (ngModelChange)="subseriesFilter.set($event)"
        placeholder="e.g., Laser" />
      <mat-icon matPrefix>search</mat-icon>
      @if (subseriesFilter()) {
      <button matSuffix matIconButton aria-label="Clear" (click)="subseriesFilter.set('')">
        <mat-icon>close</mat-icon>
      </button>
      }
    </mat-form-field>
    @if (!breakpoints.isMobile()) {
      <button class="align-right" mat-icon-button (click)="this.hide.emit()" title="Hide panel">
        <mat-icon>close</mat-icon>
      </button>
    }
  </div>

  <mat-accordion multi>
    @for (season of expansionPanels(); track season.title; let isFirst = $first) {
    <mat-expansion-panel [expanded]="isFirst">
      <mat-expansion-panel-header>
        <mat-panel-title>
          {{ season.title }}
        </mat-panel-title>
      </mat-expansion-panel-header>

      <div class="season-list-panel-body">
        <mat-nav-list>
          @for (series of season.series; track series.id) {
          <mat-list-item
            [routerLink]="['/results/viewer', series.id]"
            routerLinkActive="season-list-item--active"
            [routerLinkActiveOptions]="{ exact: true }">
            <span matListItemTitle>{{ series.name }}</span>
          </mat-list-item>
          }
        </mat-nav-list>
      </div>
    </mat-expansion-panel>
    }
  </mat-accordion>
</div>
