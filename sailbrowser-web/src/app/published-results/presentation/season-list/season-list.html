<div class="container">
  <div class="filter-container">
    <app-fleet-select
      class="filter"
      [fleetId]="fleetFilter()"
      (fleetIdChange)="fleetFilter.set($event)"
      [includeAllOption]="true"
      allOptionLabel="All fleets" />

    @if (!breakpoints.isMobile()) {
    <button class="align-right" mat-icon-button (click)="this.hide.emit()" title="Hide panel">
      <mat-icon>close</mat-icon>
    </button>
    }
  </div>

  <mat-accordion multi>
    @for (season of expansionPanels(); track season.id) {
    <mat-expansion-panel [expanded]="season.id === expandedSeasonId()">
      <mat-expansion-panel-header>
        <mat-panel-title>
          {{ season.title }}
        </mat-panel-title>
      </mat-expansion-panel-header>

      <div class="season-list-panel-body">
        <mat-nav-list>
          @for (series of season.series; track series.id) {
          <mat-list-item
            [routerLink]="['/results/viewer', series.id]"
            routerLinkActive="season-list-item--active"
            [routerLinkActiveOptions]="{ exact: true }">
            <span matListItemTitle>{{ series.name }}</span>
            @if (recentRaceBadgeCount(series) > 0) {
            <span
              matListItemMeta
              [matBadge]="recentRaceBadgeCount(series)"
              matBadgeSize="large"
              matBadgeColor="primary"
              matBadgeDescription="Races in the last 6 days">
            </span>
            }
          </mat-list-item>
          }
        </mat-nav-list>
      </div>
    </mat-expansion-panel>
    }
  </mat-accordion>
</div>
